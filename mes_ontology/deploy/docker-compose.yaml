# mes_ontology 루트에서 실행:
#   docker compose -f deploy/docker-compose.yaml up --build -d
#
# 빌드 context 는 항상 mes_ontology 루트(..)로 고정해 compose 실행 위치와 무관하게 동작합니다.

services:
  neo4j:
    image: neo4j:5
    container_name: mes-ontology-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/passwd
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "n10s.*,apoc.*"
      NEO4J_dbms_security_auth__minimum__password__length: 6
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - ../app/ontology:/import/ontology
      - ../plugins:/var/lib/neo4j/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "passwd", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - mes-ontology

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: mes-ontology-backend
    volumes:
      - ../app/ontology:/app/ontology
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: passwd
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mes-ontology

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        VITE_API_URL: /api
    container_name: mes-ontology-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - mes-ontology

volumes:
  neo4j_data:

networks:
  mes-ontology:
    driver: bridge
